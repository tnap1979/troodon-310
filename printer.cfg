# This file contains common pin mappings for the BIGTREETECH Kraken.
# To use this config, the firmware should be compiled for the
# STM32H723 with a "128KiB bootloader" "25 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PD0/PD1)".

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]
[include KAMP_Settings.cfg]

[mcu]
canbus_uuid: 7428028a86ee

[mcu can0]
canbus_uuid: 37f6f949587d

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[idle_timeout]
timeout: 8000

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[force_move]
enable_force_move: True

[exclude_object]

[gcode_arcs]
resolution: 0.1

# S1
[stepper_x]
step_pin: PC14
dir_pin: !PC13
enable_pin: !PE6
rotation_distance: 40
microsteps: 64
full_steps_per_rotation: 400  
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 55       # You want a medium speed. Too slow = no back-EMF, too fast = crash.
homing_retract_dist: 0 # MUST be 0 for sensorless homing

# S2
[stepper_y]
step_pin: PE5
dir_pin: !PE4
enable_pin: !PE3
rotation_distance: 40
microsteps: 64
full_steps_per_rotation: 400  
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 55
homing_retract_dist: 0 # MUST be 0 for sensorless homing

# S5
[stepper_z]
step_pin: PG9
dir_pin: PG10
enable_pin: !PG13
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 375
position_min: -3
homing_speed: 35
second_homing_speed: 3
homing_retract_dist: 0

# S6
[stepper_z1]
step_pin: PG11
dir_pin: PD7
enable_pin: !PG12
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

# S7
[stepper_z2]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

# S8
[stepper_z3]
step_pin: PG15
dir_pin: PB6
enable_pin: !PG14
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

########################################
# TMC2160 configuration
########################################

# S1
[tmc5160 stepper_x]
cs_pin: PD6
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
interpolate: False
run_current: 1.2
sense_resistor: 0.05   # <-- V1.1 uses 0.05 for drives 1-4
diag1_pin: ^PC15      
#driver_SGT: 1
driver_SGT: 35

# S2
[tmc5160 stepper_y]
cs_pin: PD5
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
interpolate: False
run_current: 1.2
sense_resistor: 0.05   # <-- V1.1 uses 0.05 for drives 1-4
diag1_pin: ^!PF0      
#driver_SGT: 1
driver_SGT: 25

