spi_software_miso_pin: PC7
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 999999

[tmc5160 stepper_z1]
cs_pin: PA15
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 999999

[tmc5160 stepper_z2]
cs_pin: PA9
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 999999

[tmc5160 stepper_z3]
cs_pin: PA10
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.800
sense_resistor: 0.075
stealthchop_threshold: 999999

[probe]
pin: ^!can0:PB8 # The '^' enables the pullup resistor, which most Tap PCBs require.
x_offset: 0
y_offset: 0
z_offset: -0.015 # Start with a slight negative offset; you will fine-tune this later.
speed: 10.0
samples: 4
samples_result: median
sample_retract_dist: 4.0
samples_tolerance: 0.006
samples_tolerance_retries: 4
activate_gcode:
    {% set PROBE_TEMP = 150 %}
    {% set MAX_TEMP = PROBE_TEMP + 5 %}
    {% set ACTUAL_TEMP = printer.extruder.temperature %}
    {% set TARGET_TEMP = printer.extruder.target %}

    {% if TARGET_TEMP > PROBE_TEMP %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (TARGET_TEMP, PROBE_TEMP)) }
        M109 S{ PROBE_TEMP }
    {% else %}
        # Temperature target is already low enough, but nozzle may still be hot.
        {% if ACTUAL_TEMP > MAX_TEMP %}
            { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (ACTUAL_TEMP, MAX_TEMP)) }
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={ MAX_TEMP }
        {% endif %}
    {% endif %}

[quad_gantry_level]
gantry_corners:
   -60,-10
   360,370
points:
   10,10
   10,280
   284,280
   284,10
speed: 350
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.025
max_adjust: 20

[bed_mesh]
speed: 50
horizontal_move_z: 5
mesh_min: 4, 18.8
mesh_max: 300, 300
probe_count: 10, 10
algorithm: bicubic

# BED
[heater_bed]
heater_pin: PF5
sensor_pin: PB0 # TB
sensor_type: ATC Semitec 104GT-2
control: watermark
min_temp: 0
max_temp: 130

## EXTRUDER 
[extruder]
step_pin: can0:PD0
dir_pin: can0:PD1
enable_pin: !can0:PD2
rotation_distance: 22.67895 #for 5mm Shaft Driven Bondtech gearsets
#rotation_distance: 4.637
#rotation_distance: 5.7 #Bondtech LGX Drive Gears
#gear_ratio: 44:10, 37:17
microsteps: 32
full_steps_per_rotation: 200 #1.8deg Motor
max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
max_extrude_cross_section: 50
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: can0:PB13
sensor_pin: can0:PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
#pullup_resistor: 1100
control: pid
pid_Kp: 22.621 #pid_Kp=22.621 pid_Ki=2.900 pid_Kd=44.111
pid_Ki: 2.900
pid_Kd: 44.111
min_temp: 0
max_temp: 350
max_power: 1.0
min_extrude_temp: 170
##  Try to keep pressure_advance below 1.0
pressure_advance: 0.03  ## eSun PA-CF 0.4mm-nozzle PA tune
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.040

## EXTRUDER MOTOR
[tmc2209 extruder]
uart_pin: can0:PA15
interpolate: false
run_current: 0.65
sense_resistor: 0.110
#stealthchop_threshold: 0

## ADXL345
[adxl345]
cs_pin: can0:PB12
spi_software_sclk_pin: can0:PB10
spi_software_mosi_pin: can0:PB11
spi_software_miso_pin: can0:PB2

[resonance_tester]
accel_chip: adxl345
probe_points:
    155,160,20  # an example for a 350mm printer

[temperature_sensor BTT-EBB36]
sensor_type: temperature_mcu
sensor_mcu: can0
min_temp: 10
max_temp: 100

[heater_fan hotend_fan]
##  Hotend Fan - FAN1
pin: can0:PA1
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

## PART COOLING
[fan]
pin: can0:PA0
kick_start_time: 0.25
cycle_time: 0.15
## off_below: 0.10

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 115

